name: Deploy Infrastructure Auditor

on:
  push:
    branches: [ main ]
    paths:
      - 'lambda-code/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 pytest pytest-cov
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop build if there are Python syntax errors or undefined names
        flake8 lambda-code/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warn about style issues
        flake8 lambda-code/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=lambda-code --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Format
      run: terraform fmt -check -recursive terraform/
    
    - name: Terraform Init
      run: cd terraform && terraform init -backend=false
    
    - name: Terraform Validate
      run: cd terraform && terraform validate

  build:
    name: Build Lambda Package
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Create deployment package
      run: |
        mkdir -p build
        cp lambda-code/lambda_function.py build/
        cd build
        zip -r ../infrastructure-auditor.zip .
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: lambda-deployment-package
        path: infrastructure-auditor.zip
        retention-days: 30

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test, validate-terraform, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: lambda-deployment-package
    
    - name: Deploy Lambda function
      run: |
        aws lambda update-function-code \
          --function-name infrastructure-auditor \
          --zip-file fileb://infrastructure-auditor.zip
    
    - name: Wait for deployment
      run: |
        aws lambda wait function-updated \
          --function-name infrastructure-auditor
    
    - name: Verify deployment
      run: |
        VERSION=$(aws lambda get-function --function-name infrastructure-auditor --query 'Configuration.LastModified' --output text)
        echo "Lambda function deployed. Last modified: $VERSION"
    
    - name: Slack notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Infrastructure Auditor deployment ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}